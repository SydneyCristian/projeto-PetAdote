<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PetAdote{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="paw">🐾</span>
            <span class="brand-name">PetAdote</span>
        </div>
        <div class="nav-links">
            <a href="/animais" class="nav-link">Animais</a>
            {% if current_user.is_authenticated %}
                <a href="/animais/cadastrar" class="nav-link">+ Cadastrar Animal</a>
                <a href="/login_usuario/logout" class="nav-link nav-logout">Sair</a>
            {% else %}
                <a href="/" class="nav-link nav-cta">Entrar</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>🐾 PetAdote — Todo animal merece um lar cheio de amor.</p>
    </footer>
</body>
</html>
